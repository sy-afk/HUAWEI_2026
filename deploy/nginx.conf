# nginx reverse proxy for SafeSpace on Huawei Cloud ECS.
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/safespace.conf
#   (replace YOUR_DOMAIN, then run certbot — see DEPLOY.md)
#
# Why nginx at all: Vapi will only POST call outcomes to an HTTPS URL, and
# Let's Encrypt needs a real hostname. Node serves plain HTTP on :3000 and nginx
# terminates TLS in front of it.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # certbot writes its challenge here; everything else goes to HTTPS.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # certbot fills these in.
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # The app is the only thing that should be reachable; don't advertise nginx.
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;

    # Drill payloads are small; cap the body so nobody can push junk at us.
    client_max_body_size 256k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
